# Interactive shell: run ./shell (or: up -d then docker compose exec openclaw bash)
# Note: "compose up" foreground does not attach stdin reliably; use exec for TTY.
# Start gateway manually: openclaw gateway --port 18789 --verbose --bind lan
services:
  openclaw:
    network_mode: host
    build: .
    container_name: openclaw
    stdin_open: true
    tty: true
    # ports:
    #   - "127.0.0.1:18789:18789"
    volumes:
      - ~/.openclaw:/root/.openclaw
    restart: "no"
    security_opt:
      - no-new-privileges:true
