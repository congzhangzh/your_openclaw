services:
  openclaw:
    build: .
    container_name: openclaw
    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"
    volumes:
      - ${OPENCLAW_DATA:-~/.openclaw}:/root/.openclaw
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./setup.sh:/setup.sh:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
