services:
  openclaw:
    build: .
    container_name: openclaw
    stdin_open: true          # keep bash alive (docker run -i)
    tty: true                 # allocate pseudo-TTY (docker run -t)
    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"
    volumes:
      - ${OPENCLAW_DATA:-~/.openclaw}:/root/.openclaw
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
